            overflow: hidden;
            width: 100%;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: inherit;
        }

        /* Slide Container */
        .slide-container {
            position: relative;
            padding-bottom: 56.25%;
            /* 16:9 Aspect Ratio */

            overflow: hidden;

        }

</head>

            },
            {
                id: 13,

                category: 'หลักอีหม่าน',
                youtubeId: 'HB7av2O8sbc',
                slideEmbedUrl: 'https://drive.google.com/file/d/1onj7vhO1ufNyf4jkh_nkBgBZsNhSkOIa/preview',
                pdfUrl: 'https://drive.google.com/file/d/1onj7vhO1ufNyf4jkh_nkBgBZsNhSkOIa/view'
            },
            {
                id: 14,
                title: 'หัวข้อที่ 15',
                category: 'หลักอีหม่าน',
                youtubeId: 'HB7av2O8sbc',
                slideEmbedUrl: 'https://drive.google.com/file/d/1onj7vhO1ufNyf4jkh_nkBgBZsNhSkOIa/preview',
                pdfUrl: 'https://drive.google.com/file/d/1onj7vhO1ufNyf4jkh_nkBgBZsNhSkOIa/view'
            }

            // เพิ่มหัวข้อจนครบ 15 หัวข้อในอนาคตที่นี่
        ];

        let currentIndex = 0;

        // ดึง Elements ที่เกี่ยวข้อง
        const titleEl = document.getElementById('lessonTitle');
        const categoryEl = document.getElementById('categoryLabel');
        const videoPlayer = document.getElementById('videoPlayer');
        const slidePlayer = document.getElementById('slidePlayer');
        const downloadBtn = document.getElementById('downloadPdfBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const currentNumEl = document.getElementById('currentLessonNum');
        const totalNumEl = document.getElementById('totalLessonsNum');

        // ฟังก์ชันเริ่มต้น (Initial Setup)
        function initApp() {
            totalNumEl.innerText = lessons.length;
            loadLesson(currentIndex);
        }

        // โหลดข้อมูลบทเรียนลงบน UI
        function loadLesson(index) {
            const lesson = lessons[index];

            // Text Updates
            titleEl.innerText = `${lesson.title}`;
            categoryEl.innerText = lesson.category;
            currentNumEl.innerText = index + 1; // 1-based index based on position

            // Media Updates
            videoPlayer.src = `https://www.youtube.com/embed/${lesson.youtubeId}?rel=0`;
            slidePlayer.src = lesson.slideEmbedUrl;
            downloadBtn.href = lesson.pdfUrl;

            // Handle Navigation Button States
            prevBtn.disabled = index === 0;
            if (index === 0) prevBtn.classList.remove('hover-float');
            else prevBtn.classList.add('hover-float');

            nextBtn.disabled = index === lessons.length - 1;
            if (index === lessons.length - 1) nextBtn.classList.remove('hover-float');
            else nextBtn.classList.add('hover-float');

            // Animate fade briefly
            document.body.style.opacity = '0.7';
            setTimeout(() => { document.body.style.opacity = '1'; }, 150);

            // Scroll เล็กน้อยเพื่อให้รู้ว่าเปลี่ยนบทเรียนแล้วถ้าดูจากจอมือถือ
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ปุ่มก่อนหน้า
        function prevLesson() {
            if (currentIndex > 0) {
                currentIndex--;
                loadLesson(currentIndex);
            }
        }

        // ปุ่มถัดไป
        function nextLesson() {
            if (currentIndex < lessons.length - 1) {
                currentIndex++;
                loadLesson(currentIndex);
            }
        }

        // Web Share API
        async function shareContent() {
            const lesson = lessons[currentIndex];
            const shareData = {
                title: `โครงการอบรมผู้สนใจอิสลาม - ${lesson.title}`,
                text: `เชิญร่วมศึกษาหัวข้อ "${lesson.title}" พร้อมวิดีโอและเอกสารประกอบเนื้อหาฟรี`,
                url: window.location.href // ลิงก์ของหน้าเว็บ
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    // หากเบราว์เซอร์ไม่รองรับ
                    navigator.clipboard.writeText(`${shareData.text}\n${shareData.url}`);

                    // สร้าง Alert เล็กๆ หรือ notification (ตรงนี้ขอใช้ alert ง่ายๆ ก่อน)
                    alert('คัดลอกลิงก์เรียบร้อยแล้ว! สามารถนำไปวางเพื่อแชร์ได้เลย');
                }
            } catch (err) {
                console.log('User cancelled share or error occurred:', err);
            }
        }

        // รอหน้าเว็บโหลดเสร็จค่อยรัน
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>

</html>
